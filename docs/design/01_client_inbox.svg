<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" font-family="Inter, Arial, sans-serif">
  <title>Creative Review — Client Review Inbox</title>
  <desc>Wireframe showing the client's list of pending assets to review</desc>

  <rect width="900" height="620" fill="#F7F7F5"/>

  <g id="frame">
    <rect x="40" y="40" width="820" height="540" rx="12" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <g id="topbar">
      <rect x="40" y="40" width="820" height="56" rx="12" fill="#FFFFFF"/>
      <rect x="40" y="95" width="820" height="1" fill="#E5E4E0"/>
      <rect x="60" y="60" width="24" height="24" rx="6" fill="#E6F1FB"/>
      <text x="94" y="76" font-size="14" font-weight="500" fill="#1A1A1A">Creative Review</text>
      <text x="720" y="76" font-size="12" fill="#6B6B6B" text-anchor="end">Reviewing as jane@acme.co</text>
      <circle cx="825" cy="68" r="14" fill="#E6F1FB"/>
      <text x="825" y="72" font-size="11" font-weight="500" fill="#185FA5" text-anchor="middle">JD</text>
    </g>

    <g id="header">
      <text x="60" y="136" font-size="18" font-weight="500" fill="#1A1A1A">My reviews</text>
      <text x="60" y="158" font-size="13" fill="#6B6B6B">3 items waiting on your decision</text>
    </g>

    <g id="tabs">
      <rect x="60" y="180" width="90" height="26" rx="8" fill="#E6F1FB"/>
      <text x="105" y="197" font-size="12" font-weight="500" fill="#185FA5" text-anchor="middle">Pending (3)</text>
      <text x="165" y="197" font-size="12" fill="#6B6B6B">Approved (8)</text>
      <text x="245" y="197" font-size="12" fill="#6B6B6B">Changes requested (2)</text>
    </g>

    <g id="row-1">
      <rect x="60" y="230" width="780" height="80" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>
      <rect x="76" y="242" width="56" height="56" rx="6" fill="#F1EFE8"/>
      <text x="104" y="274" font-size="11" fill="#9C9C9C" text-anchor="middle">IMG</text>
      <text x="148" y="266" font-size="14" font-weight="500" fill="#1A1A1A">Homepage hero v2.png</text>
      <text x="148" y="284" font-size="12" fill="#6B6B6B">Spring campaign · Image</text>
      <text x="660" y="266" font-size="12" font-weight="500" fill="#A32D2D" text-anchor="end">Due tomorrow</text>
      <text x="660" y="284" font-size="11" fill="#9C9C9C" text-anchor="end">Apr 18, 5:00 PM</text>
      <rect x="690" y="256" width="130" height="28" rx="8" fill="#FFFFFF" stroke="#9C9C9C" stroke-width="1"/>
      <text x="755" y="274" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Review</text>
    </g>

    <g id="row-2">
      <rect x="60" y="322" width="780" height="80" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>
      <rect x="76" y="334" width="56" height="56" rx="6" fill="#F1EFE8"/>
      <text x="104" y="366" font-size="11" fill="#9C9C9C" text-anchor="middle">PDF</text>
      <text x="148" y="358" font-size="14" font-weight="500" fill="#1A1A1A">Brand guidelines draft.pdf</text>
      <text x="148" y="376" font-size="12" fill="#6B6B6B">Rebrand · Document</text>
      <text x="660" y="358" font-size="12" fill="#6B6B6B" text-anchor="end">Due in 3 days</text>
      <text x="660" y="376" font-size="11" fill="#9C9C9C" text-anchor="end">Apr 20, 5:00 PM</text>
      <rect x="690" y="348" width="130" height="28" rx="8" fill="#FFFFFF" stroke="#9C9C9C" stroke-width="1"/>
      <text x="755" y="366" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Review</text>
    </g>

    <g id="row-3">
      <rect x="60" y="414" width="780" height="80" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>
      <rect x="76" y="426" width="56" height="56" rx="6" fill="#F1EFE8"/>
      <text x="104" y="458" font-size="11" fill="#9C9C9C" text-anchor="middle">WIRE</text>
      <text x="148" y="450" font-size="14" font-weight="500" fill="#1A1A1A">Checkout flow — mobile</text>
      <text x="148" y="468" font-size="12" fill="#6B6B6B">Checkout redesign · Wireframe</text>
      <text x="660" y="450" font-size="12" fill="#6B6B6B" text-anchor="end">Due in 5 days</text>
      <text x="660" y="468" font-size="11" fill="#9C9C9C" text-anchor="end">Apr 22, 5:00 PM</text>
      <rect x="690" y="440" width="130" height="28" rx="8" fill="#FFFFFF" stroke="#9C9C9C" stroke-width="1"/>
      <text x="755" y="458" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Review</text>
    </g>
  </g>
</svg>
