<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="Inter, Arial, sans-serif">
  <title>Creative Review — Admin Asset Detail</title>
  <desc>Wireframe showing the admin's view of a single asset with version history and reviewer annotations</desc>

  <rect width="1200" height="760" fill="#F7F7F5"/>

  <g id="frame">
    <rect x="40" y="40" width="1120" height="680" rx="12" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <g id="topbar">
      <rect x="40" y="95" width="1120" height="1" fill="#E5E4E0"/>
      <text x="60" y="76" font-size="13" fill="#6B6B6B">← Spring campaign</text>
      <text x="180" y="76" font-size="13" fill="#9C9C9C">/</text>
      <text x="195" y="76" font-size="13" font-weight="500" fill="#1A1A1A">Homepage hero</text>

      <rect x="920" y="56" width="160" height="28" rx="8" fill="#FFFFFF" stroke="#9C9C9C" stroke-width="1"/>
      <text x="1000" y="74" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Upload new version</text>

      <rect x="1092" y="56" width="52" height="28" rx="8" fill="#FFFFFF" stroke="#9C9C9C" stroke-width="1"/>
      <text x="1118" y="74" font-size="12" fill="#1A1A1A" text-anchor="middle">Archive</text>
    </g>

    <g id="divider-vertical">
      <rect x="735" y="96" width="1" height="624" fill="#E5E4E0"/>
    </g>

    <g id="preview-panel">
      <rect x="60" y="120" width="655" height="380" rx="8" fill="#F1EFE8"/>
      <text x="387" y="305" font-size="13" fill="#9C9C9C" text-anchor="middle">[ asset preview — image ]</text>

      <g id="mini-pin-1">
        <circle cx="220" cy="220" r="12" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="220" cy="220" r="12" fill="#185FA5"/>
        <text x="220" y="225" font-size="11" font-weight="500" fill="#FFFFFF" text-anchor="middle">1</text>
      </g>
      <g id="mini-pin-2">
        <circle cx="480" cy="295" r="12" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="480" cy="295" r="12" fill="#185FA5"/>
        <text x="480" y="300" font-size="11" font-weight="500" fill="#FFFFFF" text-anchor="middle">2</text>
      </g>
      <g id="mini-pin-3">
        <circle cx="340" cy="410" r="12" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="340" cy="410" r="12" fill="#185FA5"/>
        <text x="340" y="415" font-size="11" font-weight="500" fill="#FFFFFF" text-anchor="middle">3</text>
      </g>

      <text x="60" y="540" font-size="11" font-weight="500" fill="#6B6B6B" letter-spacing="0.5">VERSIONS</text>

      <g id="version-current">
        <rect x="60" y="558" width="315" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
        <text x="78" y="580" font-size="12" font-weight="500" fill="#185FA5">v2 · current</text>
        <text x="78" y="600" font-size="11" fill="#185FA5">Apr 15 · pending</text>
      </g>

      <g id="version-old">
        <rect x="395" y="558" width="320" height="56" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>
        <text x="413" y="580" font-size="12" font-weight="500" fill="#1A1A1A">v1</text>
        <text x="413" y="600" font-size="11" fill="#6B6B6B">Apr 10 · rejected · 3 annotations</text>
      </g>
    </g>

    <g id="activity-panel">
      <rect x="755" y="124" width="100" height="24" rx="8" fill="#FAEEDA"/>
      <text x="805" y="140" font-size="12" font-weight="500" fill="#854F0B" text-anchor="middle">Pending review</text>

      <text x="755" y="170" font-size="12" fill="#6B6B6B">Image · deadline Apr 18, 5:00 PM</text>
      <text x="755" y="188" font-size="12" fill="#6B6B6B">2 reviewers · 3 annotations</text>

      <text x="755" y="222" font-size="11" font-weight="500" fill="#6B6B6B" letter-spacing="0.5">REVIEW ACTIVITY</text>

      <g id="activity-1">
        <rect x="755" y="240" width="385" height="108" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>
        <circle cx="775" cy="262" r="11" fill="#E6F1FB"/>
        <text x="775" y="266" font-size="10" font-weight="500" fill="#185FA5" text-anchor="middle">JD</text>
        <text x="794" y="266" font-size="13" font-weight="500" fill="#1A1A1A">Jane Doe</text>
        <text x="858" y="266" font-size="11" fill="#9C9C9C">on v2</text>
        <rect x="1070" y="254" width="56" height="20" rx="6" fill="#E6F1FB"/>
        <text x="1098" y="268" font-size="11" font-weight="500" fill="#185FA5" text-anchor="middle">Pin 1</text>
        <text x="775" y="292" font-size="13" fill="#1A1A1A">Logo feels too small against the dark sky —</text>
        <text x="775" y="310" font-size="13" fill="#1A1A1A">can we scale it 15% bigger?</text>
        <text x="775" y="334" font-size="11" fill="#9C9C9C">Apr 16, 10:22 AM</text>
      </g>

      <g id="activity-2">
        <rect x="755" y="360" width="385" height="88" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>
        <circle cx="775" cy="382" r="11" fill="#E6F1FB"/>
        <text x="775" y="386" font-size="10" font-weight="500" fill="#185FA5" text-anchor="middle">JD</text>
        <text x="794" y="386" font-size="13" font-weight="500" fill="#1A1A1A">Jane Doe</text>
        <text x="858" y="386" font-size="11" fill="#9C9C9C">on v2</text>
        <rect x="1070" y="374" width="56" height="20" rx="6" fill="#E6F1FB"/>
        <text x="1098" y="388" font-size="11" font-weight="500" fill="#185FA5" text-anchor="middle">Pin 2</text>
        <text x="775" y="412" font-size="13" fill="#1A1A1A">The product photo looks flat.</text>
        <text x="775" y="430" font-size="13" fill="#1A1A1A">Brighter lighting please.</text>
      </g>

      <g id="activity-3">
        <rect x="755" y="460" width="385" height="36" rx="8" fill="#F1EFE8"/>
        <circle cx="775" cy="478" r="11" fill="#F1EFE8" stroke="#9C9C9C" stroke-width="1"/>
        <text x="775" y="482" font-size="10" font-weight="500" fill="#6B6B6B" text-anchor="middle">MK</text>
        <text x="794" y="482" font-size="13" fill="#1A1A1A">Marcus Kim</text>
        <text x="875" y="482" font-size="11" fill="#9C9C9C">· waiting on v2</text>
      </g>

      <rect x="755" y="660" width="385" height="40" rx="8" fill="#1A1A1A"/>
      <text x="947" y="685" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">Send reminder to reviewers</text>
    </g>
  </g>
</svg>
