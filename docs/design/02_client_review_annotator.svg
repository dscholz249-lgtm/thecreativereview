<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="Inter, Arial, sans-serif">
  <title>Creative Review — Client Review with Image Annotator</title>
  <desc>Wireframe showing the primary image review flow with click-to-pin annotations and a numbered footnote panel</desc>

  <rect width="1200" height="760" fill="#F7F7F5"/>

  <g id="frame">
    <rect x="40" y="40" width="1120" height="680" rx="12" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <g id="topbar">
      <rect x="40" y="95" width="1120" height="1" fill="#E5E4E0"/>
      <text x="60" y="76" font-size="13" fill="#6B6B6B">← My reviews</text>
      <text x="145" y="76" font-size="13" fill="#9C9C9C">/</text>
      <text x="160" y="76" font-size="13" fill="#6B6B6B">Spring campaign</text>
      <text x="275" y="76" font-size="13" fill="#9C9C9C">/</text>
      <text x="290" y="76" font-size="13" font-weight="500" fill="#1A1A1A">Homepage hero v2.png</text>

      <rect x="1020" y="58" width="120" height="24" rx="8" fill="#FAEEDA"/>
      <text x="1080" y="74" font-size="12" font-weight="500" fill="#854F0B" text-anchor="middle">Due tomorrow</text>
    </g>

    <g id="divider">
      <rect x="715" y="96" width="1" height="624" fill="#E5E4E0"/>
    </g>

    <g id="preview-panel">
      <rect x="40" y="96" width="675" height="624" fill="#F1EFE8"/>

      <g id="image-placeholder">
        <rect x="95" y="160" width="565" height="360" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
        <text x="377" y="345" font-size="13" fill="#9C9C9C" text-anchor="middle">[ click anywhere to pin a comment ]</text>

        <g id="pin-1">
          <circle cx="220" cy="268" r="14" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="3"/>
          <circle cx="220" cy="268" r="14" fill="#185FA5"/>
          <text x="220" y="273" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">1</text>
        </g>

        <g id="pin-2">
          <circle cx="462" cy="332" r="14" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="3"/>
          <circle cx="462" cy="332" r="14" fill="#185FA5"/>
          <text x="462" y="337" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">2</text>
        </g>

        <g id="pin-3">
          <circle cx="321" cy="453" r="14" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="3"/>
          <circle cx="321" cy="453" r="14" fill="#BA7517"/>
          <text x="321" y="458" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">3</text>
        </g>
      </g>

      <text x="95" y="578" font-size="12" fill="#6B6B6B">Image preview · pins scale with the image</text>
      <text x="95" y="596" font-size="12" fill="#9C9C9C">Version 2 · uploaded by Dana · Apr 15</text>
    </g>

    <g id="comments-panel">
      <text x="735" y="124" font-size="11" font-weight="500" fill="#6B6B6B" letter-spacing="0.5">COMMENTS (3)</text>

      <g id="comment-1">
        <rect x="735" y="146" width="405" height="80" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>
        <circle cx="757" cy="168" r="11" fill="#185FA5"/>
        <text x="757" y="172" font-size="11" font-weight="500" fill="#FFFFFF" text-anchor="middle">1</text>
        <text x="778" y="172" font-size="13" fill="#1A1A1A">Logo feels too small against the dark sky —</text>
        <text x="778" y="189" font-size="13" fill="#1A1A1A">can we scale it 15% bigger?</text>
        <text x="778" y="213" font-size="11" fill="#9C9C9C">You · just now</text>
      </g>

      <g id="comment-2">
        <rect x="735" y="238" width="405" height="72" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>
        <circle cx="757" cy="260" r="11" fill="#185FA5"/>
        <text x="757" y="264" font-size="11" font-weight="500" fill="#FFFFFF" text-anchor="middle">2</text>
        <text x="778" y="264" font-size="13" fill="#1A1A1A">The product photo looks flat here.</text>
        <text x="778" y="281" font-size="13" fill="#1A1A1A">Brighter lighting please.</text>
        <text x="778" y="301" font-size="11" fill="#9C9C9C">You · just now</text>
      </g>

      <g id="comment-3-active">
        <rect x="735" y="322" width="405" height="130" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
        <circle cx="757" cy="344" r="11" fill="#FFFFFF" stroke="#BA7517" stroke-width="1"/>
        <text x="757" y="348" font-size="11" font-weight="500" fill="#854F0B" text-anchor="middle">3</text>
        <rect x="778" y="332" width="346" height="76" rx="6" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="1"/>
        <text x="788" y="354" font-size="13" fill="#9C9C9C">What's wrong with the CTA button?</text>
        <rect x="1042" y="418" width="52" height="22" rx="6" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="1"/>
        <text x="1068" y="433" font-size="11" fill="#1A1A1A" text-anchor="middle">Cancel</text>
        <rect x="1098" y="418" width="42" height="22" rx="6" fill="#1A1A1A"/>
        <text x="1119" y="433" font-size="11" fill="#FFFFFF" text-anchor="middle">Save</text>
      </g>

      <g id="decision-bar">
        <rect x="735" y="604" width="405" height="1" fill="#E5E4E0"/>
        <rect x="735" y="624" width="196" height="40" rx="8" fill="#FFFFFF" stroke="#9C9C9C" stroke-width="1"/>
        <text x="833" y="649" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Approve</text>
        <rect x="944" y="624" width="196" height="40" rx="8" fill="#FFFFFF" stroke="#9C9C9C" stroke-width="1"/>
        <text x="1042" y="649" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Request changes</text>
        <text x="937" y="688" font-size="11" fill="#9C9C9C" text-anchor="middle">3 pins count as feedback</text>
      </g>
    </g>
  </g>
</svg>
