<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" font-family="Inter, Arial, sans-serif">
  <title>Creative Review — Admin Dashboard</title>
  <desc>Wireframe showing the admin dashboard with metric cards and active projects table</desc>

  <rect width="1200" height="720" fill="#F7F7F5"/>

  <g id="frame">
    <rect x="40" y="40" width="1120" height="640" rx="12" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <g id="topbar">
      <rect x="40" y="95" width="1120" height="1" fill="#E5E4E0"/>
      <rect x="60" y="56" width="24" height="24" rx="6" fill="#E6F1FB"/>
      <text x="94" y="72" font-size="14" font-weight="500" fill="#1A1A1A">Creative Review</text>

      <text x="240" y="72" font-size="13" font-weight="500" fill="#1A1A1A">Dashboard</text>
      <text x="320" y="72" font-size="13" fill="#6B6B6B">Clients</text>
      <text x="380" y="72" font-size="13" fill="#6B6B6B">Reports</text>
      <text x="442" y="72" font-size="13" fill="#6B6B6B">Settings</text>

      <rect x="1020" y="52" width="120" height="32" rx="8" fill="#1A1A1A"/>
      <text x="1080" y="72" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">+ New asset</text>
    </g>

    <g id="metric-cards">
      <rect x="60" y="118" width="250" height="80" rx="8" fill="#F1EFE8"/>
      <text x="80" y="145" font-size="12" fill="#6B6B6B">Pending review</text>
      <text x="80" y="180" font-size="26" font-weight="500" fill="#1A1A1A">14</text>

      <rect x="325" y="118" width="250" height="80" rx="8" fill="#F1EFE8"/>
      <text x="345" y="145" font-size="12" fill="#6B6B6B">Overdue</text>
      <text x="345" y="180" font-size="26" font-weight="500" fill="#A32D2D">3</text>

      <rect x="590" y="118" width="250" height="80" rx="8" fill="#F1EFE8"/>
      <text x="610" y="145" font-size="12" fill="#6B6B6B">Approved this week</text>
      <text x="610" y="180" font-size="26" font-weight="500" fill="#1A1A1A">22</text>

      <rect x="855" y="118" width="285" height="80" rx="8" fill="#F1EFE8"/>
      <text x="875" y="145" font-size="12" fill="#6B6B6B">Active projects</text>
      <text x="875" y="180" font-size="26" font-weight="500" fill="#1A1A1A">8</text>
    </g>

    <g id="table-section">
      <text x="60" y="240" font-size="15" font-weight="500" fill="#1A1A1A">Active projects</text>
      <text x="1140" y="240" font-size="12" fill="#1A1A1A" font-weight="500" text-anchor="end">All clients ▾</text>
      <text x="1065" y="240" font-size="12" fill="#6B6B6B" text-anchor="end">Filter:</text>

      <rect x="60" y="260" width="1080" height="400" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

      <g id="table-header">
        <rect x="60" y="260" width="1080" height="40" rx="8" fill="#F7F7F5"/>
        <rect x="60" y="300" width="1080" height="1" fill="#E5E4E0"/>
        <text x="80" y="285" font-size="11" font-weight="500" fill="#6B6B6B" letter-spacing="0.5">PROJECT</text>
        <text x="380" y="285" font-size="11" font-weight="500" fill="#6B6B6B" letter-spacing="0.5">CLIENT</text>
        <text x="600" y="285" font-size="11" font-weight="500" fill="#6B6B6B" letter-spacing="0.5">PROGRESS</text>
        <text x="900" y="285" font-size="11" font-weight="500" fill="#6B6B6B" letter-spacing="0.5">DEADLINE</text>
      </g>

      <g id="row-1">
        <text x="80" y="333" font-size="13" font-weight="500" fill="#1A1A1A">Spring campaign</text>
        <text x="380" y="333" font-size="13" fill="#6B6B6B">Acme Co.</text>
        <rect x="600" y="325" width="200" height="6" rx="3" fill="#F1EFE8"/>
        <rect x="600" y="325" width="140" height="6" rx="3" fill="#185FA5"/>
        <text x="600" y="346" font-size="11" fill="#6B6B6B">7 / 10 approved</text>
        <text x="900" y="333" font-size="13" font-weight="500" fill="#A32D2D">Apr 18</text>
        <text x="1120" y="333" font-size="12" font-weight="500" fill="#185FA5" text-anchor="end">Remind →</text>
        <rect x="60" y="370" width="1080" height="1" fill="#E5E4E0"/>
      </g>

      <g id="row-2">
        <text x="80" y="403" font-size="13" font-weight="500" fill="#1A1A1A">Rebrand — phase 2</text>
        <text x="380" y="403" font-size="13" fill="#6B6B6B">Norwood Studio</text>
        <rect x="600" y="395" width="200" height="6" rx="3" fill="#F1EFE8"/>
        <rect x="600" y="395" width="80" height="6" rx="3" fill="#185FA5"/>
        <text x="600" y="416" font-size="11" fill="#6B6B6B">4 / 10 approved</text>
        <text x="900" y="403" font-size="13" fill="#1A1A1A">Apr 25</text>
        <text x="1120" y="403" font-size="12" font-weight="500" fill="#185FA5" text-anchor="end">Remind →</text>
        <rect x="60" y="440" width="1080" height="1" fill="#E5E4E0"/>
      </g>

      <g id="row-3">
        <text x="80" y="473" font-size="13" font-weight="500" fill="#1A1A1A">Checkout redesign</text>
        <text x="380" y="473" font-size="13" fill="#6B6B6B">Fieldgoods</text>
        <rect x="600" y="465" width="200" height="6" rx="3" fill="#F1EFE8"/>
        <rect x="600" y="465" width="170" height="6" rx="3" fill="#3B6D11"/>
        <text x="600" y="486" font-size="11" fill="#6B6B6B">6 / 7 approved</text>
        <text x="900" y="473" font-size="13" fill="#1A1A1A">May 2</text>
        <text x="1120" y="473" font-size="12" font-weight="500" fill="#185FA5" text-anchor="end">Remind →</text>
        <rect x="60" y="510" width="1080" height="1" fill="#E5E4E0"/>
      </g>

      <g id="row-4">
        <text x="80" y="543" font-size="13" font-weight="500" fill="#1A1A1A">Quarterly newsletter</text>
        <text x="380" y="543" font-size="13" fill="#6B6B6B">Acme Co.</text>
        <rect x="600" y="535" width="200" height="6" rx="3" fill="#F1EFE8"/>
        <rect x="600" y="535" width="40" height="6" rx="3" fill="#185FA5"/>
        <text x="600" y="556" font-size="11" fill="#6B6B6B">1 / 5 approved</text>
        <text x="900" y="543" font-size="13" fill="#1A1A1A">May 10</text>
        <text x="1120" y="543" font-size="12" font-weight="500" fill="#185FA5" text-anchor="end">Remind →</text>
      </g>
    </g>
  </g>
</svg>
