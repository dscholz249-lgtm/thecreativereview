<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="The Creative Review">
  <!-- Outer ink squircle container (app-icon style; renders well on
       light browser chrome and as an iOS/Android home-screen icon). -->
  <rect width="200" height="200" rx="44" fill="#0A0A0A"/>
  <!-- Inset paper ticket. Same geometry ratios as the full-lockup glyph,
       squared into the container with padding to match the brand app icon. -->
  <rect x="32" y="32" width="136" height="136" rx="14" fill="#F5F3EE"/>
  <!-- Accent-green check panel. -->
  <rect x="50" y="58" width="100" height="84" rx="8" fill="#34D17E"/>
  <!-- Check mark in ink. -->
  <path d="M 66 100 L 88 120 L 134 72" stroke="#0A0A0A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
